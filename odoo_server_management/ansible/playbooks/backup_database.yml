---
# Real-time on-demand backup: dump the database via Odoo's backup endpoint and
# upload it to the server's Backup Project bucket using a short-lived pre-signed
# PUT URL minted by Odoo. NO object-storage credentials touch the managed server.
# The master password is passed via the environment (not the command line) so the
# real curl error stays visible instead of being censored.
- hosts: all
  gather_facts: no
  become: no
  tasks:
    - name: Backup database and upload via pre-signed URL
      environment:
        ADMIN_PASSWORD: "{{ admin_password }}"
      shell: |
        set -e
        URL={{ url | quote }}
        DB={{ database_name | quote }}
        FMT={{ backup_format | default('zip') | quote }}
        PUT={{ presigned_url | quote }}
        EXT=zip; [ "$FMT" = "dump" ] && EXT=dump
        WORK="$(mktemp -d)"
        TMP="$WORK/${DB}.${EXT}"
        # 1. Produce an Odoo-format backup (zip = DB + filestore, dump = SQL).
        curl -sSf -X POST \
          -F "master_pwd=$ADMIN_PASSWORD" -F "name=$DB" -F "backup_format=$FMT" \
          -o "$TMP" "$URL/web/database/backup"
        # 2. Upload straight to object storage via the pre-signed URL.
        curl -sSf -X PUT --upload-file "$TMP" "$PUT"
        rm -rf "$WORK"
        echo OK
      args:
        executable: /bin/bash
      register: backup_result

    - name: Result
      debug:
        msg: "{{ backup_result.stdout }}"
