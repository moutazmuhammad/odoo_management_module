---
- hosts: all
  gather_facts: no
  become: yes
  tasks:
    - name: Remove .pyc files before pull
      ansible.builtin.shell: |
        find {{ path | quote }} -name "*.pyc" -delete
      become_user: "{{ odoo_user }}"
      args:
        executable: /bin/bash

    # Keep the token OFF the command line: a tiny askpass helper reads it from the
    # environment at run time. Because the secret is no longer in the command, we
    # can drop no_log and the REAL git error (auth/conflict/divergence) is shown.
    - name: Create git askpass helper
      ansible.builtin.copy:
        dest: "/tmp/.osm_askpass_{{ service_name }}.sh"
        mode: "0700"
        content: |
          #!/bin/sh
          case "$1" in
            *[Uu]sername*) printf '%s' "$OSM_GH_USER" ;;
            *[Pp]assword*) printf '%s' "$OSM_GH_TOKEN" ;;
          esac
      become_user: "{{ odoo_user }}"

    - name: Git stash + pull (real errors visible; token via askpass env)
      ansible.builtin.shell: |
        cd {{ path | quote }} || exit 9
        STASHED=0
        if git stash push -u -m "odoo-server-mgmt auto-pull" 2>&1 | grep -q "Saved working directory"; then
          STASHED=1
        fi
        GIT_ASKPASS="/tmp/.osm_askpass_{{ service_name }}.sh" GIT_TERMINAL_PROMPT=0 \
          git -c credential.helper= pull --no-rebase --no-edit {{ repo_url | quote }} {{ branch_name | quote }}
        rc=$?
        # Always restore our stash handling regardless of the pull result.
        if [ "$STASHED" = "1" ]; then git stash drop >/dev/null 2>&1 || true; fi
        exit $rc
      environment:
        OSM_GH_USER: "{{ github_user }}"
        OSM_GH_TOKEN: "{{ github_token }}"
      become_user: "{{ odoo_user }}"
      args:
        executable: /bin/bash

    - name: Remove git askpass helper
      ansible.builtin.file:
        path: "/tmp/.osm_askpass_{{ service_name }}.sh"
        state: absent
      become_user: "{{ odoo_user }}"

    - name: Restart Odoo service
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: restarted
