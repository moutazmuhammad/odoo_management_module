---
# Lightweight probe used by the daily backup-existence monitor to explain WHY a
# server has no recent backup: free disk on the scratch/backup paths, whether the
# agent + cron are installed, and the tail of the agent log. Prints a single
# ODOO_BACKUPPROBE_JSON:<base64 json> marker parsed by the manager.
- hosts: all
  gather_facts: no
  become: yes
  tasks:
    - name: Probe backup health
      shell: |
        python3 - <<'PY'
        import os, json, base64, shutil
        info = {'disk': {}}
        for p in ('/var/tmp', '/var', '/'):
            try:
                u = shutil.disk_usage(p)
                info['disk'][p] = {
                    'free_gb': round(u.free / 1e9, 1),
                    'pct_used': round(u.used * 100.0 / u.total) if u.total else 0,
                }
            except Exception:
                pass
        info['agent_installed'] = os.path.exists('/opt/odoo-backup/agent.py')
        info['cron_installed'] = os.path.exists('/etc/cron.d/odoo-backup')
        tail = ''
        try:
            with open('/var/log/odoo-backup.log', 'rb') as fh:
                fh.seek(0, 2)
                size = fh.tell()
                fh.seek(max(0, size - 4000))
                tail = fh.read().decode('utf-8', 'replace')
        except Exception:
            tail = ''
        info['log_tail'] = tail[-1500:]
        print('ODOO_BACKUPPROBE_JSON:' +
              base64.b64encode(json.dumps(info).encode()).decode())
        PY
      register: probe
      changed_when: false

    - debug:
        msg: "{{ probe.stdout }}"
